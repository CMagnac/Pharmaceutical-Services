{% extends "base.html" %}

{% block title %}Accueil{% endblock %}
{% block header %}Questionnaires{% endblock %}

{% block content %}
<div class="container">
    {% for key, form in forms.items() %}
        <a href="{{ url_for('questionnaire', form_id=key) }}">
            <button class="submit-btn">{{ form.title }}</button>
        </a>
    {% endfor %}
</div>
{% endblock %}
